<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-start:#1c2045;
  --bg-end:#0e1020;
  --card-bg:rgba(27,30,51,0.4);
  --card-border:rgba(255,255,255,0.06);
  --accent:#4da3ff;
  --accent-glow:rgba(77,163,255,0.8);
  --accent-bright:#6bb3ff;
  --text-primary:#ffffff;
  --text-secondary:#b8c0ff;
  --success:#4dff88;
  --success-glow:rgba(77,255,136,0.6);
  --warning:#ffaa4d;
  --action:#ff6b6b;
  --glass-bg:rgba(255,255,255,0.02);
  --glass-border:rgba(255,255,255,0.04);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(ellipse at top,var(--bg-start) 0%,var(--bg-end) 100%);
  min-height:100vh;
  padding:20px 16px 40px;
  color:var(--text-primary);
}

.container{
  max-width:430px;
  margin:0 auto;
  animation:fadeIn 0.5s cubic-bezier(0.4,0,0.2,1);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px) scale(0.96);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.header{
  text-align:center;
  margin-bottom:20px;
  padding-top:8px;
}

.header h1{
  font-size:26px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.header-icon{
  width:28px;
  height:28px;
  fill:var(--accent);
  filter:drop-shadow(0 0 10px var(--accent-glow));
}

.subtitle-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:6px;
  flex-wrap:wrap;
}

.subtitle{
  color:var(--text-secondary);
  font-size:13px;
  font-weight:500;
}

.header-indicators{
  display:flex;
  align-items:center;
  gap:6px;
}

.mini-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s ease;
}

.mini-dot.active{
  background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
}

.mini-dot.reboot{
  background:var(--warning);
  box-shadow:0 0 8px rgba(255,170,77,0.6);
}

.mini-dot.action{
  background:var(--action);
  box-shadow:0 0 8px rgba(255,107,107,0.6);
}

.status-bar{
  display:flex;
  gap:8px;
  margin-bottom:20px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:none;
  justify-content:center;
}

.status-bar::-webkit-scrollbar{
  display:none;
}

.status-pill{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  background:var(--glass-bg);
  backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  color:var(--text-secondary);
  transition:all 0.3s ease;
}

.status-pill.active{
  background:rgba(77,163,255,0.25);
  border-color:var(--accent);
  color:var(--accent-bright);
  box-shadow:0 0 15px rgba(77,163,255,0.3);
}

.status-pill.reboot{
  background:rgba(255,170,77,0.25);
  border-color:var(--warning);
  color:var(--warning);
  box-shadow:0 0 15px rgba(255,170,77,0.3);
}

.status-pill.action{
  background:rgba(255,107,107,0.25);
  border-color:var(--action);
  color:var(--action);
  box-shadow:0 0 15px rgba(255,107,107,0.3);
}

.status-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 8px currentColor;
}

.main-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.feature-card{
  position:relative;
  aspect-ratio:1;
  border-radius:24px;
  overflow:hidden;
  cursor:pointer;
  background:var(--card-bg);
  backdrop-filter:blur(10px);
  border:1px solid var(--card-border);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}

.feature-card:active{
  transform:scale(0.95);
}

.feature-card.active{
  background:linear-gradient(135deg,rgba(77,163,255,0.4) 0%,rgba(77,163,255,0.15) 100%);
  border-color:var(--accent);
  box-shadow:0 0 40px rgba(77,163,255,0.4),0 0 80px rgba(77,163,255,0.1),inset 0 0 30px rgba(77,163,255,0.1);
}

.feature-card.active .card-bg-icon{
  fill:var(--accent-bright);
  opacity:0.6;
  filter:drop-shadow(0 0 30px var(--accent-glow));
  transform:translate(-50%,-50%) scale(1.1);
}

.feature-card.active .card-content{
  background:linear-gradient(to top,rgba(14,16,32,0.98) 0%,rgba(14,16,32,0.85) 40%,rgba(77,163,255,0.1) 100%);
}

.feature-card.active .card-indicator{
  background:var(--success);
  box-shadow:0 0 15px var(--success-glow),0 0 30px var(--success);
  transform:scale(1.3);
}

.feature-card.active .card-title{
  color:var(--accent-bright);
  text-shadow:0 0 20px rgba(77,163,255,0.5);
}

.card-bg-icon{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:75%;
  height:75%;
  fill:var(--text-secondary);
  opacity:0.12;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;
}

.card-content{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:16px;
  background:linear-gradient(to top,rgba(14,16,32,0.95) 0%,rgba(14,16,32,0.7) 50%,transparent 100%);
  z-index:2;
  transition:all 0.3s ease;
}

.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}

.card-title{
  font-size:14px;
  font-weight:700;
  color:var(--text-primary);
  line-height:1.2;
  transition:all 0.3s ease;
}

.card-indicator{
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}

.card-desc{
  font-size:11px;
  color:var(--text-secondary);
  line-height:1.3;
  opacity:0.9;
}

.card-badge{
  position:absolute;
  top:12px;
  right:12px;
  padding:4px 8px;
  border-radius:8px;
  font-size:9px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.5px;
  z-index:3;
  backdrop-filter:blur(10px);
}

.card-badge.reboot{
  background:rgba(255,170,77,0.3);
  color:#fff;
  border:1px solid rgba(255,170,77,0.5);
  box-shadow:0 4px 15px rgba(255,170,77,0.3);
}

.card-badge.action{
  background:rgba(255,107,107,0.3);
  color:#fff;
  border:1px solid rgba(255,107,107,0.5);
  box-shadow:0 4px 15px rgba(255,107,107,0.3);
}

.summary-card{
  grid-column:span 2;
  background:linear-gradient(135deg,rgba(77,163,255,0.25) 0%,rgba(77,163,255,0.08) 100%);
  backdrop-filter:blur(20px);
  border:1px solid rgba(77,163,255,0.25);
  border-radius:24px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:16px;
  box-shadow:0 8px 32px rgba(77,163,255,0.15);
}

.summary-ring{
  position:relative;
  width:60px;
  height:60px;
  flex-shrink:0;
}

.summary-ring svg{
  transform:rotate(-90deg);
  width:100%;
  height:100%;
}

.ring-bg{
  fill:none;
  stroke:rgba(255,255,255,0.1);
  stroke-width:4;
}

.ring-fill{
  fill:none;
  stroke:var(--accent);
  stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:163.36;
  stroke-dashoffset:163.36;
  transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  filter:drop-shadow(0 0 6px var(--accent-glow));
}

.ring-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:16px;
  font-weight:800;
  color:var(--text-primary);
}

.summary-info h3{
  font-size:16px;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:4px;
}

.summary-info p{
  font-size:13px;
  color:var(--text-secondary);
}

.footer{
  margin-top:24px;
  text-align:center;
  color:var(--text-secondary);
  font-size:12px;
  opacity:0.6;
  font-weight:500;
}
</style>
</head>

let enabledCount=0;
let pendingRebootCount=0;
let pendingActionCount=0;

function popup(msg,type="info"){
  try{
    if(typeof window.toast==="function"){window.toast(String(msg));return;}
    if(window.kernelsu&&typeof window.kernelsu.toast==="function"){window.kernelsu.toast(String(msg));return;}
    if(typeof ksu==="object"&&typeof ksu.toast==="function"){ksu.toast(String(msg));return;}
  }catch{}
  const n=document.createElement("div");
  n.className="webui-popup";
  n.textContent=msg;
  const colors={error:"#f44336",success:"#4caf50",info:"#1565c0",warn:"#ff8f00"};
  const bg=colors[type]||"#0099FF";
  Object.assign(n.style,{
    position:"fixed",top:"-70px",left:"50%",transform:"translateX(-50%)",
    background:bg,color:"#fff",padding:"0.8rem 1.2rem",borderRadius:"8px",
    boxShadow:"0 6px 18px rgba(0,0,0,0.35)",fontWeight:"600",zIndex:"99999",
    transition:"top 0.36s,opacity 0.36s",opacity:"0"
  });
  document.body.appendChild(n);
  requestAnimationFrame(()=>{n.style.top="20px";n.style.opacity="1";});
  setTimeout(()=>{n.style.top="-70px";n.style.opacity="0";setTimeout(()=>n.remove(),420);},2500);
}

function runShell(cmd){
  return new Promise(function(resolve){
    if(window.parent&&window.parent.runShellFromIframe){
      window.parent.runShellFromIframe(cmd).then(function(result){
        resolve(result||"");
      }).catch(function(){
        resolve("");
      });
    }else{
      resolve("");
    }
  });
}

function updateVisuals(id,isActive){
  const card=document.getElementById("card-"+id);
  if(card)card.classList.toggle("active",isActive);
}

function updateStats(){
  document.getElementById("count-active").textContent=enabledCount+" Active";
  document.getElementById("count-reboot").textContent=pendingRebootCount+" Reboot";
  document.getElementById("count-action").textContent=pendingActionCount+" Action";
  document.getElementById("progress-detail").textContent=enabledCount+" of "+FILES.length+" settings enabled";

  const percent=Math.round((enabledCount/FILES.length)*100);
  document.getElementById("progress-percent").textContent=percent+"%";

  const circle=document.getElementById("progress-circle");
  const circumference=163.36;
  const offset=circumference-(enabledCount/FILES.length*circumference);
  circle.style.strokeDashoffset=offset;

  document.getElementById("pill-active").style.opacity=enabledCount>0?"1":"0.5";
  document.getElementById("pill-reboot").style.opacity=pendingRebootCount>0?"1":"0.5";
  document.getElementById("pill-action").style.opacity=pendingActionCount>0?"1":"0.5";

  document.getElementById("mini-active").style.opacity=enabledCount>0?"1":"0.3";
  document.getElementById("mini-reboot").style.opacity=pendingRebootCount>0?"1":"0.3";
  document.getElementById("mini-action").style.opacity=pendingActionCount>0?"1":"0.3";
}

function countEnabledStates(){
  enabledCount=0;
  pendingRebootCount=0;
  pendingActionCount=0;
  for(let i=0;i<FILES.length;i++){
    const card=document.getElementById("card-"+FILES[i]);
    if(card&&card.classList.contains("active")){
      enabledCount++;
      if(REBOOT_ITEMS.indexOf(FILES[i])!==-1)pendingRebootCount++;
      if(ACTION_ITEMS.indexOf(FILES[i])!==-1)pendingActionCount++;
    }
  }
  updateStats();
}

async function toggleFile(id,enable){
  if(enable){
    await runShell('touch "'+DIR+"/"+id+'"');
    popup(MESSAGES[id].on,"success");
  }else{
    await runShell('rm -f "'+DIR+"/"+id+'"');
    popup(MESSAGES[id].off,"info");
  }
  updateVisuals(id,enable);
  countEnabledStates();
}

function handleToggle(id){
  const card=document.getElementById("card-"+id);
  const newState=!card.classList.contains("active");
  toggleFile(id,newState);
}

function createCard(cfg){
  const div=document.createElement("div");
  div.className="feature-card";
  div.id="card-"+cfg.id;
  div.onclick=function(){handleToggle(cfg.id);};
  let badgeHtml="";
  if(cfg.badge){
    badgeHtml='<div class="card-badge '+cfg.badge+'">'+cfg.badge+"</div>";
  }
  div.innerHTML=badgeHtml+'<svg class="card-bg-icon" viewBox="0 0 24 24"><path d="'+cfg.icon+'"/></svg><div class="card-content"><div class="card-header"><div class="card-title">'+cfg.title+'</div><div class="card-indicator"></div></div><div class="card-desc">'+cfg.desc+"</div></div>";
  return div;
}

async function loadAllStates(){
  const cmd='for f in '+FILES.join(" ")+';do if [ -f "'+DIR+'/$f" ];then echo "$f:1";else echo "$f:0";fi;done';
  const result=await runShell(cmd);
  if(!result)return;
  const lines=result.trim().split("\n");
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;
    const parts=line.split(":");
    if(parts.length>=2){
      updateVisuals(parts[0],parts[1].trim()==="1");
    }
  }
  countEnabledStates();
}

function init(){
  const grid=document.getElementById("grid");
  for(let i=0;i<CONFIG.length;i++){
    grid.appendChild(createCard(CONFIG[i]));
  }
  updateStats();
  setTimeout(loadAllStates,100);
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
