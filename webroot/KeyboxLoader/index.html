<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keybox Loader</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: radial-gradient(circle at 20% 0%, #1c2045 0%, #0e1020 50%, #070810 100%);
  --surface: rgba(27, 30, 51, 0.8);
  --surface-hover: rgba(37, 42, 77, 0.9);
  --border: rgba(255, 255, 255, 0.08);
  --text-primary: #e9ecff;
  --text-secondary: #9aa3ff;
  --text-muted: #6b75cc;
  --accent: #4da3ff;
  --accent-glow: rgba(77, 163, 255, 0.4);
  --success: #4dff88;
  --error: #ff4d6d;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  padding: 24px 16px;
}

.container { max-width: 420px; margin: 0 auto; }

.hero {
  text-align: center;
  margin-bottom: 32px;
  padding-top: 20px;
}

.key-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--accent) 0%, #0066ff 100%);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 40px rgba(77, 163, 255, 0.4), 
              inset 0 1px 0 rgba(255, 255, 255, 0.2),
              0 0 0 1px rgba(255, 255, 255, 0.1);
  position: relative;
}

.key-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 28px;
  background: linear-gradient(135deg, var(--accent), transparent);
  opacity: 0.3;
  z-index: -1;
  filter: blur(12px);
}

.key-icon span { color: white; font-size: 36px; }

.hero h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 6px;
  background: linear-gradient(180deg, #fff 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  font-size: 0.9rem;
  color: var(--text-muted);
  font-weight: 500;
}

.slot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

.slot {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
}

.slot::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(77, 163, 255, 0.1) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

.slot:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: rgba(77, 163, 255, 0.3);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.slot.active {
  background: linear-gradient(135deg, rgba(77, 163, 255, 0.2) 0%, rgba(77, 163, 255, 0.05) 100%);
  border-color: rgba(77, 163, 255, 0.4);
  box-shadow: 0 0 40px rgba(77, 163, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.slot.active::before { opacity: 1; }

.slot-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  transition: all 0.3s;
}

.slot.active .slot-num {
  background: var(--accent);
  color: white;
  border-color: rgba(255, 255, 255, 0.2);
  box-shadow: 0 4px 16px rgba(77, 163, 255, 0.4);
}

.slot-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.slot.active .slot-label { color: var(--accent); }

.check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 20px;
  height: 20px;
  background: var(--success);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.slot.active .check {
  opacity: 1;
  transform: scale(1);
}

.check span { color: #0e1020; font-size: 14px; }

.files-container { position: relative; }

.files-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 0 4px;
}

.files-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.refresh {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
}

.refresh:hover {
  background: rgba(77, 163, 255, 0.1);
  color: var(--accent);
  border-color: rgba(77, 163, 255, 0.3);
}

.refresh:active { transform: scale(0.9); }

.refresh.spinning { animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

.file-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.file-item::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.3s;
}

.file-item:hover {
  transform: translateX(8px);
  border-color: rgba(77, 163, 255, 0.3);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.file-item:hover::after { opacity: 1; }

.file-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(77, 163, 255, 0.15) 0%, rgba(77, 163, 255, 0.05) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  border: 1px solid rgba(77, 163, 255, 0.2);
  flex-shrink: 0;
}

.file-icon span { font-size: 24px; }

.file-info { flex: 1; min-width: 0; }

.file-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
}

.load-arrow {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(77, 163, 255, 0.1);
  border: 1px solid rgba(77, 163, 255, 0.2);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.3s;
}

.file-item:hover .load-arrow {
  opacity: 1;
  transform: translateX(0);
}

.load-arrow span { font-size: 20px; }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
}

.empty-icon span { font-size: 40px; opacity: 0.5; }

.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 16px 28px;
  border-radius: 50px;
  background: rgba(27, 30, 51, 0.95);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.95rem;
  font-weight: 600;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: rgba(77, 255, 136, 0.3); color: var(--success); }
.toast.error { border-color: rgba(255, 77, 109, 0.3); color: var(--error); }

.scanning {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: inline-block;
}
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="key-icon">
      <span class="material-icons-round">vpn_key</span>
    </div>
    <h1>Keybox Loader</h1>
    <p>Select a slot, then scan and choose a file</p>
  </div>

  <div class="slot-grid">
    <div class="slot active" data-slot="1">
      <div class="slot-num">1</div>
      <div class="slot-label">Slot</div>
      <div class="check"><span class="material-icons-round">check</span></div>
    </div>
    <div class="slot" data-slot="2">
      <div class="slot-num">2</div>
      <div class="slot-label">Slot</div>
      <div class="check"><span class="material-icons-round">check</span></div>
    </div>
    <div class="slot" data-slot="3">
      <div class="slot-num">3</div>
      <div class="slot-label">Slot</div>
      <div class="check"><span class="material-icons-round">check</span></div>
    </div>
  </div>

  <div class="files-container">
    <div class="files-header">
      <span class="files-title">Available Files</span>
      <button class="refresh" id="refreshBtn">
        <span class="material-icons-round" style="font-size:20px">refresh</span>
      </button>
    </div>
    <div id="fileList">
      <div class="empty">
        <div class="empty-icon">
          <span class="material-icons-round">touch_app</span>
        </div>
        <div>Tap refresh to scan</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <span class="material-icons-round" id="toastIcon">check_circle</span>
  <span id="toastText">Success</span>
</div>

<script>
const LOGFILE="/data/adb/Box-Brain/Integrity-Box-Logs/keybox_scan.log";
const RUNNER="/data/adb/modules/playintegrityfix/webroot/common_scripts/run_scan.sh";
const DEST="/data/adb/tricky_store";

let slot=1;
let allFiles=[];
let isScanning=false;

function runShell(cmd){
  return new Promise((res,rej)=>{
    if(window.parent&&window.parent.runShellFromIframe){
      window.parent.runShellFromIframe(cmd).then(res).catch(rej);
    }else{
      rej("Shell unavailable");
    }
  });
}

function showToast(msg,type){
  const t=document.getElementById("toast");
  const icon=document.getElementById("toastIcon");
  const text=document.getElementById("toastText");
  
  icon.textContent=type==="success"?"check_circle":"error";
  text.textContent=msg;
  t.className="toast show "+type;
  
  setTimeout(()=>t.classList.remove("show"),2500);
}

async function scan(){
  if(isScanning) return;
  isScanning=true;
  
  const btn=document.getElementById("refreshBtn");
  const list=document.getElementById("fileList");
  
  btn.classList.add("spinning");
  list.innerHTML='<div class="scanning"><div class="spinner"></div><span>Scanning...</span></div>';
  
  try{
    await runShell(`rm -f ${LOGFILE}`);
    await runShell(`sh -c 'sh ${RUNNER} &'`);
  }catch{}
  
  let found=false;
  const start=Date.now();
  const poll=setInterval(async()=>{
    try{
      const cur=await runShell(`cat ${LOGFILE}`);
      if(cur && cur.trim().length>0){
        found=true;
        clearInterval(poll);
        parseFiles(cur);
      }
    }catch(e){
      console.log("Poll error:",e);
    }
    
    if(Date.now()-start>10000){
      clearInterval(poll);
      if(!found) renderEmpty();
    }
  },400);
  
  btn.classList.remove("spinning");
  isScanning=false;
}

function parseFiles(out){
  allFiles=out.split("\n").filter(Boolean).map(l=>{
    const[ts,size,path]=l.split("|");
    return{ts:+ts,size:+size,path,name:path.split("/").pop()};
  });
  render();
}

function render(){
  const list=document.getElementById("fileList");
  if(allFiles.length===0){
    renderEmpty();
    return;
  }
  
  list.innerHTML=allFiles.map(f=>`
    <div class="file-item" onclick="loadFile('${f.path}')">
      <div class="file-icon">
        <span class="material-icons-round">description</span>
      </div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${(f.size/1024).toFixed(1)} KB • ${new Date(f.ts*1000).toLocaleDateString()}</div>
      </div>
      <div class="load-arrow">
        <span class="material-icons-round">arrow_forward</span>
      </div>
    </div>
  `).join('');
}

function renderEmpty(){
  document.getElementById("fileList").innerHTML=`
    <div class="empty">
      <div class="empty-icon">
        <span class="material-icons-round">folder_open</span>
      </div>
      <div>No keybox files found</div>
    </div>
  `;
}

async function loadFile(path){
  const names=["","keybox.xml","keybox2.xml","keybox3.xml"];
  try{
    await runShell(`
      mkdir -p ${DEST} &&
      cp -f "${path}" ${DEST}/${names[slot]} &&
      chmod 644 ${DEST}/${names[slot]}
    `);
    showToast(`Loaded to Slot ${slot}`,"success");
  }catch{
    showToast("Failed to load","error");
  }
}

document.querySelectorAll(".slot").forEach(s=>{
  s.onclick=()=>{
    document.querySelectorAll(".slot").forEach(x=>x.classList.remove("active"));
    s.classList.add("active");
    slot=+s.dataset.slot;
  };
});

document.getElementById("refreshBtn").onclick=scan;
</script>
</body>
</html>
